# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to NPM in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/togethercomputer/together-typescript/actions/workflows/publish-npm.yml
name: Publish NPM
on:
  workflow_dispatch:

  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          yarn install

      - name: Publish to NPM
        run: |
          bash ./bin/publish-npm
        env:
          NPM_TOKEN: ${{ secrets.TOGETHER_NPM_TOKEN || secrets.NPM_TOKEN }}

      - name: Invoke post-publish webhook
        if: ${{ success() }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $WEBHOOK_AUTH" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"$(jq -r .version package.json)\"}" \
            "$WEBHOOK_URL"

        env:
          WEBHOOK_URL: ${{ secrets.PUBLISH_WEBHOOK_URL }}
          WEBHOOK_AUTH: ${{ secrets.PUBLISH_WEBHOOK_AUTH }}
