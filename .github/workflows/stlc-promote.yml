      #       curl -sS -X POST -H 'Content-Type: application/json' \
      #         -d "$(jq -n --arg text "$msg" '{text:$text}')" "$ALERT_WEBHOOK_URL" \
      #         || echo "::warning::Alert webhook POST failed"
      #     fi
